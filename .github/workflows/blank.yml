cat > app/src/main/java/com/rat/premium/MainActivity.java << 'EOF'
package com.rat.premium;

import android.Manifest;
import android.app.Activity;
import android.app.admin.DevicePolicyManager;
import android.content.ComponentName;
import android.content.ContentResolver;
import android.content.Context;
import android.content.Intent;
import android.content.pm.PackageManager;
import android.database.Cursor;
import android.graphics.Bitmap;
import android.hardware.camera2.CameraAccessException;
import android.hardware.camera2.CameraManager;
import android.location.Location;
import android.location.LocationListener;
import android.location.LocationManager;
import android.net.Uri;
import android.os.Build;
import android.os.Bundle;
import android.os.Environment;
import android.provider.MediaStore;
import android.provider.Settings;
import android.telephony.SmsManager;
import android.webkit.JavascriptInterface;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.widget.Toast;

import androidx.appcompat.app.AppCompatActivity;
import androidx.core.app.ActivityCompat;
import androidx.core.content.ContextCompat;
import androidx.core.content.FileProvider;

import java.io.File;
import java.io.FileOutputStream;
import java.text.SimpleDateFormat;
import java.util.ArrayList;
import java.util.Date;
import java.util.List;
import java.util.Locale;

public class MainActivity extends AppCompatActivity {
    private WebView webView;
    private CameraManager cameraManager;
    private String cameraIdBack, cameraIdFront;
    private boolean isFlashOn = false;
    private LocationManager locationManager;
    private DevicePolicyManager devicePolicyManager;
    private ComponentName adminComponent;

    @Override protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        devicePolicyManager = (DevicePolicyManager) getSystemService(DEVICE_POLICY_SERVICE);
        adminComponent = new ComponentName(this, AdminReceiver.class);

        cameraManager = (CameraManager) getSystemService(CAMERA_SERVICE);
        try {
            for (String id : cameraManager.getCameraIdList()) {
                if (cameraManager.getCameraCharacteristics(id).get(android.hardware.camera2.CameraCharacteristics.LENS_FACING)
                        == android.hardware.camera2.CameraCharacteristics.LENS_FACING_BACK) {
                    cameraIdBack = id;
                } else {
                    cameraIdFront = id;
                }
            }
        } catch (CameraAccessException e) {}

        locationManager = (LocationManager) getSystemService(LOCATION_SERVICE);

        requestPermissions();

        webView = findViewById(R.id.webView);
        webView.getSettings().setJavaScriptEnabled(true);
        webView.getSettings().setDomStorageEnabled(true);
        webView.getSettings().setMixedContentMode(WebView.getSettings().MIXED_CONTENT_ALWAYS_ALLOW);
        webView.setWebViewClient(new WebViewClient());
        webView.addJavascriptInterface(new WebAppInterface(), "Android");
        webView.loadUrl("file:///android_asset/index.html");
    }

    private void requestPermissions() {
        String[] perms = {
                Manifest.permission.CAMERA,
                Manifest.permission.ACCESS_FINE_LOCATION,
                Manifest.permission.ACCESS_BACKGROUND_LOCATION,
                Manifest.permission.READ_SMS,
                Manifest.permission.READ_EXTERNAL_STORAGE,
                Manifest.permission.WRITE_EXTERNAL_STORAGE,
                Manifest.permission.FLASHLIGHT,
                Manifest.permission.SYSTEM_ALERT_WINDOW,
                Manifest.permission.WAKE_LOCK,
                Manifest.permission.DISABLE_KEYGUARD
        };
        List<String> list = new ArrayList<>();
        for (String p : perms) {
            if (ContextCompat.checkSelfPermission(this, p) != PackageManager.PERMISSION_GRANTED)
                list.add(p);
        }
        if (!list.isEmpty())
            ActivityCompat.requestPermissions(this, list.toArray(new String[0]), 123);
    }

    public class WebAppInterface {
        // ========== OPEN APPS ==========
        @JavascriptInterface public void openApp(String pkg) {
            try {
                Intent intent = getPackageManager().getLaunchIntentForPackage(pkg);
                if (intent != null) startActivity(intent);
                else Toast.makeText(MainActivity.this, "Aplikasi tidak terinstal", Toast.LENGTH_SHORT).show();
            } catch (Exception e) { Toast.makeText(MainActivity.this, "Gagal buka", Toast.LENGTH_SHORT).show(); }
        }

        @JavascriptInterface public void openGmail() { openApp("com.google.android.gm"); }
        @JavascriptInterface public void openGallery() {
            Intent intent = new Intent(Intent.ACTION_PICK, MediaStore.Images.Media.EXTERNAL_CONTENT_URI);
            startActivity(intent);
        }
        @JavascriptInterface public void openSMS() {
            Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse("sms:"));
            startActivity(intent);
        }
        @JavascriptInterface public void openWhatsApp() { openApp("com.whatsapp"); }

        // ========== CAMERA ==========
        @JavascriptInterface public void openCameraFront() {
            try {
                Intent intent = new Intent(MediaStore.ACTION_IMAGE_CAPTURE);
                startActivity(intent);
            } catch (Exception e) { Toast.makeText(MainActivity.this, "Gagal buka kamera", Toast.LENGTH_SHORT).show(); }
        }
        @JavascriptInterface public void openCameraBack() {
            openCameraFront();
        }

        // ========== FLASHLIGHT ==========
        @JavascriptInterface public void toggleFlash() {
            try {
                if (cameraManager != null) {
                    isFlashOn = !isFlashOn;
                    String id = cameraIdBack != null ? cameraIdBack : cameraIdFront;
                    if (id != null) {
                        cameraManager.setTorchMode(id, isFlashOn);
                        Toast.makeText(MainActivity.this, isFlashOn ? "Senter ON" : "Senter OFF", Toast.LENGTH_SHORT).show();
                    }
                }
            } catch (Exception e) { Toast.makeText(MainActivity.this, "Gagal senter", Toast.LENGTH_SHORT).show(); }
        }

        // ========== LOCATION ==========
        @JavascriptInterface public String getLocation() {
            if (ActivityCompat.checkSelfPermission(MainActivity.this, Manifest.permission.ACCESS_FINE_LOCATION)
                    != PackageManager.PERMISSION_GRANTED) return "Izin lokasi belum diberikan";
            try {
                Location loc = locationManager.getLastKnownLocation(LocationManager.GPS_PROVIDER);
                if (loc == null) loc = locationManager.getLastKnownLocation(LocationManager.NETWORK_PROVIDER);
                if (loc != null) {
                    return "Lat: " + loc.getLatitude() + ", Lng: " + loc.getLongitude();
                }
                return "Lokasi tidak ditemukan";
            } catch (Exception e) { return "Error: " + e.getMessage(); }
        }

        // ========== LOCK SCREEN ==========
        @JavascriptInterface public void lockScreen() {
            if (!devicePolicyManager.isAdminActive(adminComponent)) {
                Intent intent = new Intent(DevicePolicyManager.ACTION_ADD_DEVICE_ADMIN);
                intent.putExtra(DevicePolicyManager.EXTRA_DEVICE_ADMIN, adminComponent);
                startActivity(intent);
                Toast.makeText(MainActivity.this, "Aktifkan admin dulu", Toast.LENGTH_LONG).show();
                return;
            }
            devicePolicyManager.lockNow();
            Toast.makeText(MainActivity.this, "Screen locked", Toast.LENGTH_SHORT).show();
        }

        // ========== SMS ==========
        @JavascriptInterface public void sendSMS(String number, String text) {
            try {
                SmsManager sms = SmsManager.getDefault();
                sms.sendTextMessage(number, null, text, null, null);
                Toast.makeText(MainActivity.this, "SMS terkirim ke " + number, Toast.LENGTH_SHORT).show();
            } catch (Exception e) {
                Toast.makeText(MainActivity.this, "Gagal kirim SMS", Toast.LENGTH_SHORT).show();
            }
        }

        // ========== TOAST ==========
        @JavascriptInterface public void showToast(String msg) {
            Toast.makeText(MainActivity.this, msg, Toast.LENGTH_SHORT).show();
        }
    }
}
EOF

